services:
  - type: web
    name: strategy-brain-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: DEBUG
        value: false
