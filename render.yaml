services:
  - type: web
    name: strategy-brain-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEBUG
        value: false
